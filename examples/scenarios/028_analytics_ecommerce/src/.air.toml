root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./bin/generator ./cmd/generator/main.go && ./bin/generator all && go build -o ./bin/main ./cmd/main/main.go"
bin = "./bin/main"
full_bin = "dlv --continue --accept-multiclient --listen=:2345 --headless=true --api-version=2 exec ./bin/main --"
delay = 500
exclude_file = ["config.json"]
include_ext = ["go", "pk", "pkc", "json"]
exclude_dir = ["tmp", "dist", "bin", ".piko"]
log = "air.log"
stop_on_error = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"
