<svg viewBox="0 0 500 320" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="t07-title t07-desc">
  <title id="t07-title">Tutorial 7 preview: bilingual blog with English and French routes</title>
  <desc id="t07-desc">Two browser windows side by side. The left shows /about in English with heading About and body text. The right shows /fr/about in French with heading A propos and the same body translated. The navigation link labels match the language of each page, and a subtle language switcher indicates how visitors toggle between them.</desc>
  <defs/>

  <text x="250" y="18" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">WHAT YOU WILL BUILD</text>

  
  <rect x="20" y="35" width="220" height="230" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M30,35 H230 A10,10 0 0 1 240,45 V61 H20 V45 A10,10 0 0 1 30,35 Z" fill="#1C544F"/>
  <circle cx="34" cy="47" r="4" fill="#ff5f57"/>
  <circle cx="48" cy="47" r="4" fill="#febc2e"/>
  <circle cx="62" cy="47" r="4" fill="#28c840"/>
  <rect x="80" y="41" width="150" height="12" rx="3" fill="#364049"/>
  <text x="87" y="50" fill="#C9F5F2" font-family="monospace" font-size="8">example.com/about</text>

  
  <rect x="195" y="70" width="32" height="16" rx="3" fill="#6BD5CC"/>
  <text x="211" y="82" text-anchor="middle" fill="#1C544F" font-family="system-ui, sans-serif" font-size="9" font-weight="700">EN</text>

  
  <text x="32" y="82" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="9">Home &#183; About</text>

  
  <text x="32" y="110" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="13" font-weight="600">About</text>

  
  <text x="32" y="132" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">We build the web</text>
  <text x="32" y="146" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">in Go.</text>

  <rect x="32" y="158" width="190" height="4" rx="2" fill="#A7F0E9" opacity="0.6"/>
  <rect x="32" y="168" width="180" height="4" rx="2" fill="#A7F0E9" opacity="0.5"/>
  <rect x="32" y="178" width="170" height="4" rx="2" fill="#A7F0E9" opacity="0.4"/>
  <rect x="32" y="188" width="150" height="4" rx="2" fill="#A7F0E9" opacity="0.3"/>

  
  <rect x="32" y="215" width="188" height="30" rx="6" fill="#1C544F" stroke="#6BD5CC" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="42" y="234" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="9">Lire en</text>
  <text x="80" y="234" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="9" font-weight="600">franc&#807;ais</text>
  <text x="218" y="234" text-anchor="end" fill="#A7F0E9" font-family="monospace" font-size="9">/fr/about &#8599;</text>

  
  <rect x="260" y="35" width="220" height="230" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M270,35 H470 A10,10 0 0 1 480,45 V61 H260 V45 A10,10 0 0 1 270,35 Z" fill="#1C544F"/>
  <circle cx="274" cy="47" r="4" fill="#ff5f57"/>
  <circle cx="288" cy="47" r="4" fill="#febc2e"/>
  <circle cx="302" cy="47" r="4" fill="#28c840"/>
  <rect x="320" y="41" width="150" height="12" rx="3" fill="#364049"/>
  <text x="327" y="50" fill="#C9F5F2" font-family="monospace" font-size="8">example.com/fr/about</text>

  <rect x="435" y="70" width="32" height="16" rx="3" fill="#FFEE9C"/>
  <text x="451" y="82" text-anchor="middle" fill="#1C544F" font-family="system-ui, sans-serif" font-size="9" font-weight="700">FR</text>

  <text x="272" y="82" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="9">Accueil &#183; A propos</text>

  <text x="272" y="110" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="13" font-weight="600">A propos</text>

  <text x="272" y="132" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">Nous construisons</text>
  <text x="272" y="146" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">le web en Go.</text>

  <rect x="272" y="158" width="190" height="4" rx="2" fill="#A7F0E9" opacity="0.6"/>
  <rect x="272" y="168" width="180" height="4" rx="2" fill="#A7F0E9" opacity="0.5"/>
  <rect x="272" y="178" width="170" height="4" rx="2" fill="#A7F0E9" opacity="0.4"/>
  <rect x="272" y="188" width="150" height="4" rx="2" fill="#A7F0E9" opacity="0.3"/>

  <rect x="272" y="215" width="188" height="30" rx="6" fill="#1C544F" stroke="#6BD5CC" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="282" y="234" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="9">Read in</text>
  <text x="322" y="234" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="9" font-weight="600">English</text>
  <text x="458" y="234" text-anchor="end" fill="#A7F0E9" font-family="monospace" font-size="9">/about &#8599;</text>

  <text x="250" y="290" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">One PK file, two compiled locales.</text>
  <text x="250" y="306" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">The prefix-routing strategy maps /fr/about to the French render.</text>
</svg>
