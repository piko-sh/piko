<svg viewBox="0 0 800 510" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="sse-title sse-desc">
  <title id="sse-title">SSE streaming action: browser action call to final complete event</title>
  <desc id="sse-desc">A sequence diagram with two participants, browser on the left and server on the right, time flowing top to bottom. The browser invokes the action call which becomes a POST request with an Accept text event-stream header. The server's dispatcher picks StreamProgress because the Accept header matched. Activation bars on each lifeline mark the periods both sides are active. The server emits a sequence of named progress events (percent 10, 40, 70) inside a Send loop; the browser runs onProgress for each event to update state. The server then emits a final complete event carrying the typed response, the browser runs onComplete, and the stream closes. A footer notes that without the Accept header the dispatcher calls Call instead and returns a single JSON body.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#0F766E" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-return" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#475569" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-emphasis" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#A16207" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <rect x="80" y="20" width="240" height="46" rx="10" fill="#236962" stroke="#0F766E" stroke-width="1.5"/>
  <text x="200" y="50" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">BROWSER</text>

  <rect x="480" y="20" width="240" height="46" rx="10" fill="#236962" stroke="#0F766E" stroke-width="1.5"/>
  <text x="600" y="50" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1">SERVER</text>

  
  <line x1="200" y1="66" x2="200" y2="445" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,4"/>
  <line x1="600" y1="66" x2="600" y2="445" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,4"/>

  
  <text x="190" y="92" text-anchor="end" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">actions.X.call(...)</text>
  <line x1="200" y1="110" x2="600" y2="110" stroke="#0F766E" stroke-width="1.8" stroke-dasharray="6,4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="400" y="103" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="11" font-weight="700">POST + Accept: text/event-stream</text>

  
  <text x="612" y="138" text-anchor="start" fill="#1C544F" font-family="system-ui, sans-serif" font-size="11" font-weight="700">dispatcher picks</text>
  <text x="612" y="155" text-anchor="start" fill="#A16207" font-family="monospace" font-size="11" font-weight="700">StreamProgress()</text>
  <text x="612" y="171" text-anchor="start" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Accept matched</text>

  
  <line x1="600" y1="215" x2="200" y2="215" stroke="#475569" stroke-width="1.6" stroke-dasharray="5,4" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <text x="400" y="208" text-anchor="middle" fill="#334155" font-family="monospace" font-size="11" font-weight="600">event: progress { percent: 10 }</text>

  <line x1="600" y1="245" x2="200" y2="245" stroke="#475569" stroke-width="1.6" stroke-dasharray="5,4" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <text x="400" y="238" text-anchor="middle" fill="#334155" font-family="monospace" font-size="11" font-weight="600">event: progress { percent: 40 }</text>

  <line x1="600" y1="275" x2="200" y2="275" stroke="#475569" stroke-width="1.6" stroke-dasharray="5,4" stroke-linecap="round" marker-end="url(#arrow-return)"/>
  <text x="400" y="268" text-anchor="middle" fill="#334155" font-family="monospace" font-size="11" font-weight="600">event: progress { percent: 70 }</text>

  
  
  <text x="190" y="232" text-anchor="end" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">onProgress((ev) =&gt;</text>
  <text x="190" y="248" text-anchor="end" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">  state.pct = ev)</text>
  <text x="190" y="266" text-anchor="end" fill="#475569" font-family="system-ui, sans-serif" font-size="10">runs per event</text>

  
  <text x="612" y="232" text-anchor="start" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">stream.Send(</text>
  <text x="612" y="248" text-anchor="start" fill="#A16207" font-family="monospace" font-size="11" font-weight="700">  "progress", n)</text>
  <text x="612" y="266" text-anchor="start" fill="#475569" font-family="system-ui, sans-serif" font-size="10">in a loop</text>

  
  <line x1="600" y1="325" x2="200" y2="325" stroke="#A16207" stroke-width="1.8" stroke-dasharray="5,4" stroke-linecap="round" marker-end="url(#arrow-emphasis)"/>
  <text x="400" y="318" text-anchor="middle" fill="#A16207" font-family="monospace" font-size="11" font-weight="700">event: complete { ...typed response }</text>

  
  
  <text x="190" y="350" text-anchor="end" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">onComplete((res) =&gt;</text>
  <text x="190" y="366" text-anchor="end" fill="#1C544F" font-family="monospace" font-size="11" font-weight="600">  state.done = res)</text>

  
  <text x="612" y="350" text-anchor="start" fill="#1C544F" font-family="monospace" font-size="11" font-weight="700">stream.Complete(response)</text>
  <text x="612" y="366" text-anchor="start" fill="#475569" font-family="system-ui, sans-serif" font-size="10">stream closes</text>

  
  <text x="400" y="485" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Without <tspan font-family="monospace">Accept: text/event-stream</tspan>, the dispatcher calls <tspan font-family="monospace">Call()</tspan> and returns a single JSON body instead.</text>
</svg>
