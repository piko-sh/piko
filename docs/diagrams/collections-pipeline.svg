<svg viewBox="0 0 620 380" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="cp-title cp-desc">
  <title id="cp-title">Collections pipeline: build-time enumeration to runtime render</title>
  <desc id="cp-desc">Top half is build time. Source files such as markdown, SQL, or JSON are read by a collection provider, which enumerates items. The template with p-collection attribute generates N typed routes, one per item. Bottom half is runtime. A request matches one generated route, and the page Render function receives the item data through piko.GetData.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="310" y="22" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">BUILD TIME</text>

  
  <rect x="20" y="40" width="160" height="96" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M28,40 H172 A8,8 0 0 1 180,48 V58 H20 V48 A8,8 0 0 1 28,40 Z" fill="#364049"/>
  <text x="100" y="53" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">source</text>
  <text x="100" y="75" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">content/blog/*.md</text>
  <text x="100" y="93" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">SQL table</text>
  <text x="100" y="111" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">JSON API</text>
  <text x="100" y="129" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">any provider impl</text>

  
  <rect x="220" y="40" width="180" height="96" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M230,40 H390 A10,10 0 0 1 400,50 V62 H220 V50 A10,10 0 0 1 230,40 Z" fill="#1C544F"/>
  <text x="310" y="55" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">collection provider</text>
  <text x="310" y="80" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">enumerate items</text>
  <text x="310" y="96" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">parse frontmatter</text>
  <text x="310" y="112" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">emit typed Item[]</text>
  <text x="310" y="129" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">one call per build</text>

  
  <rect x="440" y="40" width="160" height="96" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M448,40 H592 A8,8 0 0 1 600,48 V58 H440 V48 A8,8 0 0 1 448,40 Z" fill="#364049"/>
  <text x="520" y="53" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">generated routes</text>
  <text x="520" y="75" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">/blog/hello-world</text>
  <text x="520" y="91" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">/blog/new-post</text>
  <text x="520" y="107" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">/blog/...</text>
  <text x="520" y="129" text-anchor="middle" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="9" font-weight="600">one route per item</text>

  
  <line x1="185" y1="88" x2="215" y2="88" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="405" y1="88" x2="435" y2="88" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <rect x="220" y="152" width="180" height="46" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="310" y="170" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">pages/blog/{slug}.pk</text>
  <text x="310" y="188" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">p-collection="blog"</text>

  <line x1="310" y1="140" x2="310" y2="149" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <line x1="20" y1="216" x2="600" y2="216" stroke="#485461" stroke-width="1" stroke-dasharray="2,3"/>

  <text x="310" y="234" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">RUNTIME</text>

  
  <rect x="20" y="250" width="160" height="60" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M28,250 H172 A8,8 0 0 1 180,258 V268 H20 V258 A8,8 0 0 1 28,250 Z" fill="#364049"/>
  <text x="100" y="263" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">request</text>
  <text x="100" y="285" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">GET /blog/hello-world</text>
  <text x="100" y="302" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">matches generated route</text>

  
  <rect x="220" y="250" width="180" height="60" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M230,250 H390 A10,10 0 0 1 400,260 V272 H220 V260 A10,10 0 0 1 230,250 Z" fill="#1C544F"/>
  <text x="310" y="265" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Render called with item</text>
  <text x="310" y="290" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">item := piko.GetData[Post](r)</text>
  <text x="310" y="305" text-anchor="middle" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="9">typed access to that item</text>

  
  <rect x="440" y="250" width="160" height="60" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M448,250 H592 A8,8 0 0 1 600,258 V268 H440 V258 A8,8 0 0 1 448,250 Z" fill="#364049"/>
  <text x="520" y="263" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">HTML response</text>
  <text x="520" y="285" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">&lt;h1&gt;Hello World&lt;/h1&gt;</text>
  <text x="520" y="302" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">fully typed, no parsing at runtime</text>

  
  <line x1="185" y1="280" x2="215" y2="280" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="405" y1="280" x2="435" y2="280" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="310" y="348" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">Items are parsed once at build. Runtime reads them from the generated typed tables,</text>
  <text x="310" y="362" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">not from the original source files.</text>
</svg>
