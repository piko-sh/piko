<svg viewBox="0 0 760 365" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="rpt-title rpt-desc">
  <title id="rpt-title">Matcher decision tree for file-to-route resolution</title>
  <desc id="rpt-desc">A request URL enters the matcher. The matcher first checks literal segment matches. If none, it checks dynamic-segment matches, selecting the pattern with the most segments. If none, it checks catch-all matches. If still none, it dispatches the 404 route. Each node has a small truth-table of inputs and the chosen file.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#475569" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <rect x="290" y="20" width="180" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="380" y="36" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">URL</text>
  <text x="380" y="52" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="11">/blog/featured</text>

  <line x1="380" y1="64" x2="380" y2="82" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <rect x="160" y="86" width="400" height="44" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="172" y="103" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">check 1</text>
  <text x="380" y="103" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="11">does a literal match exist?</text>
  <text x="380" y="120" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">pages/blog/featured.pk</text>

  
  <line x1="565" y1="108" x2="595" y2="108" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="572" y="102" fill="#28c840" font-family="system-ui, sans-serif" font-size="9" font-weight="600">yes</text>
  <rect x="600" y="90" width="140" height="40" rx="8" fill="#2B333B" stroke="#28c840" stroke-width="1.3"/>
  <text x="670" y="107" text-anchor="middle" fill="#28c840" font-family="system-ui, sans-serif" font-size="10" font-weight="600">match</text>
  <text x="670" y="122" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="9">render this file</text>

  
  <line x1="380" y1="134" x2="380" y2="152" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-dim)"/>
  <text x="388" y="146" fill="#475569" font-family="system-ui, sans-serif" font-size="9">no</text>

  
  <rect x="160" y="156" width="400" height="44" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="172" y="173" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">check 2</text>
  <text x="380" y="173" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="11">dynamic pattern with most segments?</text>
  <text x="380" y="190" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">pages/blog/{slug}.pk</text>

  <line x1="565" y1="178" x2="595" y2="178" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="572" y="172" fill="#28c840" font-family="system-ui, sans-serif" font-size="9" font-weight="600">yes</text>
  <rect x="600" y="160" width="140" height="40" rx="8" fill="#2B333B" stroke="#28c840" stroke-width="1.3"/>
  <text x="670" y="177" text-anchor="middle" fill="#28c840" font-family="system-ui, sans-serif" font-size="10" font-weight="600">match</text>
  <text x="670" y="192" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="9">captured: slug</text>

  <line x1="380" y1="204" x2="380" y2="222" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-dim)"/>
  <text x="388" y="216" fill="#475569" font-family="system-ui, sans-serif" font-size="9">no</text>

  
  <rect x="160" y="226" width="400" height="44" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="172" y="243" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">check 3</text>
  <text x="380" y="243" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="11">catch-all pattern in scope?</text>
  <text x="380" y="260" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">pages/blog/{...path}.pk</text>

  <line x1="565" y1="248" x2="595" y2="248" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="572" y="242" fill="#28c840" font-family="system-ui, sans-serif" font-size="9" font-weight="600">yes</text>
  <rect x="600" y="230" width="140" height="40" rx="8" fill="#2B333B" stroke="#28c840" stroke-width="1.3"/>
  <text x="670" y="247" text-anchor="middle" fill="#28c840" font-family="system-ui, sans-serif" font-size="10" font-weight="600">match</text>
  <text x="670" y="262" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="9">captured: path</text>

  <line x1="380" y1="274" x2="380" y2="292" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-dim)"/>
  <text x="388" y="286" fill="#475569" font-family="system-ui, sans-serif" font-size="9">no</text>

  
  <rect x="240" y="296" width="280" height="40" rx="8" fill="#2B333B" stroke="#ff5f57" stroke-width="1.3"/>
  <text x="380" y="313" text-anchor="middle" fill="#ff5f57" font-family="system-ui, sans-serif" font-size="10" font-weight="600">404</text>
  <text x="380" y="329" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">pages/!404.pk (or parent !404)</text>

  <text x="380" y="356" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Within each tier, patterns with more path segments beat patterns with fewer.</text>
</svg>
