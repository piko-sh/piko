<svg viewBox="0 0 640 320" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="am-title am-desc">
  <title id="am-title">How invocation attributes merge with partial-root attributes</title>
  <desc id="am-desc">Two source rows feed a single merged result. The invocation contributes id, class, and other attributes. The partial root contributes its own id, class, and aria-label. The id rule overrides with the invocation value. The class rule merges both lists into a single space-separated value. The other-attribute rule overrides on collision and joins when the partial omits the attribute. The merged result row at the bottom shows the final element.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <text x="160" y="22" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">INVOCATION</text>
  <rect x="20" y="32" width="280" height="60" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M30,32 H290 A10,10 0 0 1 300,42 V50 H20 V42 A10,10 0 0 1 30,32 Z" fill="#364049"/>
  <text x="160" y="46" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">parent template</text>
  <text x="32" y="68" fill="#C9F5F2" font-family="monospace" font-size="11">&lt;div is="card" id="X"</text>
  <text x="32" y="84" fill="#C9F5F2" font-family="monospace" font-size="11">     class="A B" data-y&gt;</text>

  
  <text x="480" y="22" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">PARTIAL ROOT</text>
  <rect x="340" y="32" width="280" height="60" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M350,32 H610 A10,10 0 0 1 620,42 V50 H340 V42 A10,10 0 0 1 350,32 Z" fill="#364049"/>
  <text x="480" y="46" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">partials/card.pk</text>
  <text x="352" y="68" fill="#C9F5F2" font-family="monospace" font-size="11">&lt;div id="orig" class="C D"</text>
  <text x="352" y="84" fill="#C9F5F2" font-family="monospace" font-size="11">     aria-label="hi"&gt;</text>

  
  <rect x="20" y="108" width="600" height="92" rx="10" fill="#1C544F"/>
  <text x="320" y="125" text-anchor="middle" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="11" font-weight="600">three merge rules</text>

  
  <rect x="32" y="138" width="180" height="50" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="122" y="154" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">1. id</text>
  <text x="122" y="170" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">invocation overrides</text>
  <text x="122" y="183" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">X wins, orig drops</text>

  
  <rect x="222" y="138" width="180" height="50" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="312" y="154" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">2. class</text>
  <text x="312" y="170" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">both merge</text>
  <text x="312" y="183" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">C D + A B</text>

  
  <rect x="412" y="138" width="196" height="50" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="510" y="154" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">3. other attrs</text>
  <text x="510" y="170" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">override or join</text>
  <text x="510" y="183" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">data-y joins, aria-label kept</text>

  
  <line x1="320" y1="208" x2="320" y2="226" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <text x="320" y="246" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">MERGED RESULT</text>
  <rect x="80" y="256" width="480" height="42" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="320" y="282" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="12">&lt;div id="X" class="C D A B" data-y aria-label="hi"&gt;</text>

  <text x="320" y="312" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">The framework strips is, server.*, and request.* before merging.</text>
</svg>
