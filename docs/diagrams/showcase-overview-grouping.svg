  <text x="420" y="185" fill="#C9F5F2" font-family="monospace" font-size="10">022 &#183; 023 &#183; 024</text>
  <text x="420" y="201" fill="#C9F5F2" font-family="monospace" font-size="10">025</text>
  <text x="420" y="224" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">SQLite, MySQL, Postgres, DuckDB</text>

  
  
  <rect x="20" y="250" width="190" height="90" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M30,250 H200 A10,10 0 0 1 210,260 V272 H20 V260 A10,10 0 0 1 30,250 Z" fill="#1C544F"/>
