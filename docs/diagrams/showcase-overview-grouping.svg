  <text x="30" y="290" fill="#C9F5F2" font-family="monospace" font-size="10">014 &#183; 026 &#183; 027</text>
  <text x="30" y="306" fill="#C9F5F2" font-family="monospace" font-size="10">028</text>
  <text x="30" y="329" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">Tailwind, email, PDF, analytics</text>

  
  <rect x="215" y="250" width="190" height="90" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M225,250 H395 A10,10 0 0 1 405,260 V272 H215 V260 A10,10 0 0 1 225,250 Z" fill="#1C544F"/>
  <text x="310" y="265" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Component libraries</text>
  <text x="225" y="290" fill="#C9F5F2" font-family="monospace" font-size="10">018 &#183; 019</text>
  <text x="225" y="329" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">built-ins, Material Design 3</text>

  
  <rect x="410" y="250" width="190" height="90" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M420,250 H590 A10,10 0 0 1 600,260 V272 H410 V260 A10,10 0 0 1 420,250 Z" fill="#1C544F"/>
  <text x="505" y="265" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Full applications</text>
  <text x="420" y="290" fill="#C9F5F2" font-family="monospace" font-size="10">020 &#183; 021</text>
  <text x="420" y="329" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">recipe app, live playground</text>

  <text x="310" y="370" text-anchor="middle" fill="#A16207" font-family="system-ui, sans-serif" font-size="10" font-weight="600">every scenario has a walkthrough below and runnable source on GitHub</text>
  <text x="310" y="388" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">clone, run, read; each scenario stands on its own</text>
</svg>
