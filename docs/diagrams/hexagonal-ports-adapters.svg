  <text x="500" y="156" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PORT</text>
  <text x="500" y="168" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">email.Port</text>

  
  <line x1="120" y1="178" x2="120" y2="210" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
