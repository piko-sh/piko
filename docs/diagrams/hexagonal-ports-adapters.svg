<svg viewBox="0 0 620 500" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="hex-title hex-desc">
  <title id="hex-title">Piko core at the centre, surrounded by ports and pluggable adapters</title>
  <desc id="hex-desc">A large Piko Core container sits in the centre. Six port interfaces surround it: Cache, Storage, and Email above; LLM, Image, and Notification below. Each port has two or three named adapters plugged into it. Dashed arrows connect every port to the Piko Core.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-plug" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#475569" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <text x="310" y="18" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">ADAPTERS</text>

  
  
  <rect x="60" y="30" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="120" y="44" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">in-memory</text>
  <rect x="60" y="56" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="120" y="70" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">Valkey / Redis</text>
  <rect x="60" y="82" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="120" y="96" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">DuckDB</text>

  
  <rect x="250" y="30" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="310" y="44" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">local disk</text>
  <rect x="250" y="56" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="310" y="70" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">S3 / R2 / GCS</text>
  <rect x="250" y="82" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="310" y="96" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">custom HTTP</text>

  
  <rect x="440" y="30" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="500" y="44" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">stdout (dev)</text>
  <rect x="440" y="56" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="500" y="70" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">SES / SendGrid</text>
  <rect x="440" y="82" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="500" y="96" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">SMTP</text>

  
