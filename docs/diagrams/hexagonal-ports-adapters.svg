  <line x1="500" y1="310" x2="500" y2="342" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <rect x="60" y="346" width="120" height="34" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="120" y="362" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PORT</text>
  <text x="120" y="374" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">llm.Port</text>

  <rect x="250" y="346" width="120" height="34" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="310" y="362" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PORT</text>
  <text x="310" y="374" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">image.Port</text>

  <rect x="440" y="346" width="120" height="34" rx="8" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <text x="500" y="362" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PORT</text>
  <text x="500" y="374" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">notification.Port</text>

  
  <line x1="120" y1="384" x2="120" y2="410" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-plug)"/>
  <line x1="310" y1="384" x2="310" y2="410" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-plug)"/>
  <line x1="500" y1="384" x2="500" y2="410" stroke="#475569" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow-plug)"/>

  
  
  <rect x="60" y="416" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
