  <text x="310" y="456" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">imaginary</text>

  
  <rect x="440" y="416" width="120" height="20" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
