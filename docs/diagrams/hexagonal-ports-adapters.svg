  <text x="120" y="156" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PORT</text>
  <text x="120" y="168" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">cache.Provider</text>

