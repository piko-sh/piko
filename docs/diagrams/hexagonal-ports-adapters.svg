  <rect x="50" y="215" width="520" height="90" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <rect x="50" y="215" width="520" height="26" fill="#1C544F"/>
  <circle cx="66" cy="228" r="4" fill="#ff5f57"/>
  <circle cx="80" cy="228" r="4" fill="#febc2e"/>
  <circle cx="94" cy="228" r="4" fill="#28c840"/>
  <text x="310" y="233" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Piko Core</text>

  <text x="310" y="262" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="11">The framework defines the interfaces it depends on.</text>
  <text x="310" y="278" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="11">piko.GetCache()   piko.GetStorage()   piko.GetEmail()</text>
  <text x="310" y="295" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10">Application code talks to the port, never the adapter.</text>

  
  <line x1="120" y1="310" x2="120" y2="342" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
