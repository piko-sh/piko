<svg viewBox="0 0 620 400" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="bw-title bw-desc">
  <title id="bw-title">Bootstrap composition root: piko.New radiates With-options</title>
  <desc id="bw-desc">piko.New at the centre with eight With-options radiating out: WithCacheProvider, WithStorageProvider, WithEmailProvider, WithLLMProvider, WithImageProvider, WithNotificationProvider, WithCryptoProvider, WithCaptchaProvider. Each option takes a provider and an optional default marker. Dashed arrows connect the options to the central constructor.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <rect x="230" y="155" width="160" height="90" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M240,155 H380 A10,10 0 0 1 390,165 V177 H230 V165 A10,10 0 0 1 240,155 Z" fill="#1C544F"/>
  <circle cx="244" cy="166" r="4" fill="#ff5f57"/>
  <circle cx="258" cy="166" r="4" fill="#febc2e"/>
  <circle cx="272" cy="166" r="4" fill="#28c840"/>
  <text x="310" y="170" text-anchor="middle" fill="#92A1AF" font-family="monospace" font-size="9">main.go</text>

  <text x="244" y="200" fill="#6BD5CC" font-family="monospace" font-size="11" font-weight="600">piko.New(</text>
  <text x="244" y="218" fill="#FFEE9C" font-family="monospace" font-size="11">    options ...Option,</text>
  <text x="244" y="236" fill="#6BD5CC" font-family="monospace" font-size="11" font-weight="600">)</text>

  
  
  <rect x="30" y="40" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M38,40 H172 A8,8 0 0 1 180,48 V56 H30 V48 A8,8 0 0 1 38,40 Z" fill="#364049"/>
  <text x="105" y="51" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithCacheProvider</text>
  <text x="105" y="72" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">redis, valkey, mem</text>

  
  <rect x="230" y="40" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M238,40 H372 A8,8 0 0 1 380,48 V56 H230 V48 A8,8 0 0 1 238,40 Z" fill="#364049"/>
  <text x="305" y="51" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithStorageProvider</text>
  <text x="305" y="72" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">s3, r2, gcs, local</text>

  
  <rect x="430" y="40" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M438,40 H572 A8,8 0 0 1 580,48 V56 H430 V48 A8,8 0 0 1 438,40 Z" fill="#364049"/>
  <text x="505" y="51" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithEmailProvider</text>
  <text x="505" y="72" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">ses, sendgrid, smtp</text>

  
  <rect x="30" y="180" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M38,180 H172 A8,8 0 0 1 180,188 V196 H30 V188 A8,8 0 0 1 38,180 Z" fill="#364049"/>
  <text x="105" y="191" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithLLMProvider</text>
  <text x="105" y="212" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">openai, anthropic</text>

  
  <rect x="430" y="180" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M438,180 H572 A8,8 0 0 1 580,188 V196 H430 V188 A8,8 0 0 1 438,180 Z" fill="#364049"/>
  <text x="505" y="191" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithImageProvider</text>
  <text x="505" y="212" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">libvips, imaginary</text>

  
  <rect x="30" y="320" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M38,320 H172 A8,8 0 0 1 180,328 V336 H30 V328 A8,8 0 0 1 38,320 Z" fill="#364049"/>
  <text x="105" y="331" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithNotificationProvider</text>
  <text x="105" y="352" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">slack, smtp</text>

  
  <rect x="230" y="320" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M238,320 H372 A8,8 0 0 1 380,328 V336 H230 V328 A8,8 0 0 1 238,320 Z" fill="#364049"/>
  <text x="305" y="331" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithCryptoProvider</text>
  <text x="305" y="352" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">age, aead, libsodium</text>

  
  <rect x="430" y="320" width="150" height="40" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M438,320 H572 A8,8 0 0 1 580,328 V336 H430 V328 A8,8 0 0 1 438,320 Z" fill="#364049"/>
  <text x="505" y="331" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9" font-weight="600">WithCaptchaProvider</text>
  <text x="505" y="352" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">hcaptcha, turnstile</text>

  
  
  <line x1="180" y1="72" x2="238" y2="160" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="305" y1="82" x2="305" y2="153" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="430" y1="72" x2="382" y2="160" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <line x1="180" y1="200" x2="228" y2="200" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="430" y1="200" x2="392" y2="200" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <line x1="180" y1="328" x2="238" y2="240" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="305" y1="318" x2="305" y2="247" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="430" y1="328" x2="382" y2="240" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <text x="310" y="383" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Each option registers a named provider.</text>
  <text x="310" y="397" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">A matching WithDefault* option marks one provider as the default for unqualified calls.</text>
</svg>
