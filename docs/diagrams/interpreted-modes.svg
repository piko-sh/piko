<svg viewBox="0 0 620 360" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="im-title im-desc">
  <title id="im-title">Three Piko run modes: dev, dev-i, and prod</title>
  <desc id="im-desc">Three horizontal tracks show the feedback loop of each run mode after a save. Dev regenerates Go code, rebuilds the binary, and reloads. Dev-i regenerates bytecode and the interpreter picks it up without a rebuild. Prod compiles once ahead of time and runs optimised Go with no reload machinery. Bars under each track show relative feedback-loop speed.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <text x="20" y="25" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">MODE</text>
  <text x="270" y="25" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">WHAT HAPPENS ON SAVE</text>
  <text x="590" y="25" text-anchor="end" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">FEEDBACK</text>

  
  <rect x="20" y="40" width="100" height="76" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M30,40 H110 A10,10 0 0 1 120,50 V62 H20 V50 A10,10 0 0 1 30,40 Z" fill="#1C544F"/>
  <text x="70" y="55" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">dev</text>
  <text x="70" y="78" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">piko dev</text>
  <text x="70" y="94" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">compiled Go</text>
  <text x="70" y="108" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">hot reload</text>

  <rect x="140" y="44" width="68" height="32" rx="6" fill="#1C544F"/>
  <text x="174" y="64" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">regenerate</text>
  <line x1="210" y1="60" x2="226" y2="60" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="228" y="44" width="68" height="32" rx="6" fill="#1C544F"/>
  <text x="262" y="64" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">go build</text>
  <line x1="298" y1="60" x2="314" y2="60" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="316" y="44" width="68" height="32" rx="6" fill="#1C544F"/>
  <text x="350" y="64" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">reload</text>

  <rect x="396" y="44" width="200" height="32" rx="6" fill="#364049"/>
  <rect x="396" y="44" width="170" height="32" rx="6" fill="#92A1AF" opacity="0.6"/>
  <text x="496" y="64" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10" font-weight="600">1-3 seconds</text>

  <text x="174" y="97" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">.pk -&gt; Go</text>
  <text x="262" y="97" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">link binary</text>
  <text x="350" y="97" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">swap process</text>

  
  <rect x="20" y="140" width="100" height="76" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M30,140 H110 A10,10 0 0 1 120,150 V162 H20 V150 A10,10 0 0 1 30,140 Z" fill="#1C544F"/>
  <text x="70" y="155" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">dev-i</text>
  <text x="70" y="178" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">piko dev-i</text>
  <text x="70" y="194" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">bytecode</text>
  <text x="70" y="208" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">interpreter</text>

  <rect x="140" y="144" width="68" height="32" rx="6" fill="#1C544F"/>
  <text x="174" y="164" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">regenerate</text>
  <line x1="210" y1="160" x2="226" y2="160" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="228" y="144" width="84" height="32" rx="6" fill="#1C544F"/>
  <text x="270" y="164" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">emit bytecode</text>
  <line x1="314" y1="160" x2="330" y2="160" stroke="#0F766E" stroke-width="1.2" stroke-dasharray="3,2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="332" y="144" width="52" height="32" rx="6" fill="#1C544F"/>
  <text x="358" y="164" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">live</text>

  <rect x="396" y="144" width="200" height="32" rx="6" fill="#364049"/>
  <rect x="396" y="144" width="55" height="32" rx="6" fill="#6BD5CC" opacity="0.8"/>
  <text x="496" y="164" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10" font-weight="600">&lt; 100 ms</text>

  <text x="174" y="197" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">.pk -&gt; AST</text>
  <text x="270" y="197" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">compact form</text>
  <text x="358" y="197" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">no rebuild</text>

  
  <rect x="20" y="240" width="100" height="76" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M30,240 H110 A10,10 0 0 1 120,250 V262 H20 V250 A10,10 0 0 1 30,240 Z" fill="#1C544F"/>
  <text x="70" y="255" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">prod</text>
  <text x="70" y="278" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">piko prod</text>
  <text x="70" y="294" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">compiled once</text>
  <text x="70" y="308" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">no reload</text>

  <rect x="140" y="244" width="244" height="32" rx="6" fill="#2B333B" stroke="#485461" stroke-width="1"/>
  <text x="262" y="264" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10">build once &#183; shipped as binary &#183; no watcher</text>

  <rect x="396" y="244" width="200" height="32" rx="6" fill="#364049"/>
  <text x="496" y="264" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10">&#183; nothing to reload &#183;</text>

  <text x="262" y="297" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">optimised Go, inlined templates</text>

  <text x="310" y="346" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="9">dev-i trades compiled-Go speed for near-instant template iteration. prod gives up reload entirely.</text>
</svg>
