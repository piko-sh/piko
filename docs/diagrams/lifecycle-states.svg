<svg viewBox="0 0 760 330" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="lcs-title lcs-desc">
  <title id="lcs-title">Single lifecycle component state transitions</title>
  <desc id="lcs-desc">A state machine for one registered lifecycle component. States flow left to right: registered when added to bootstrap, starting while OnStart runs, running after OnStart returns nil, stopping when SIGTERM arrives, and stopped after OnStop returns. An error arrow from starting goes back to stopped via a rollback path that also stops earlier components.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-fail" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <rect x="45" y="20" width="670" height="70" rx="10" fill="#1C544F"/>
  <text x="58" y="38" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="10" font-weight="600">implement the interface</text>
  <text x="58" y="56" fill="#C9F5F2" font-family="monospace" font-size="10">type LifecycleComponent interface {</text>
  <text x="75" y="70" fill="#C9F5F2" font-family="monospace" font-size="10">OnStart(ctx) error ; OnStop(ctx) error ; Name() string</text>
  <text x="58" y="84" fill="#C9F5F2" font-family="monospace" font-size="10">}</text>

  
  <rect x="45" y="115" width="110" height="60" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M55,115 H145 A10,10 0 0 1 155,125 V137 H45 V125 A10,10 0 0 1 55,115 Z" fill="#364049"/>
  <text x="100" y="129" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">registered</text>
  <text x="100" y="153" text-anchor="middle" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">WithLifecycle()</text>
  <text x="100" y="167" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">at bootstrap</text>

  
  <line x1="160" y1="145" x2="200" y2="145" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="180" y="137" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Run()</text>

  
  <rect x="205" y="115" width="110" height="60" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M215,115 H305 A10,10 0 0 1 315,125 V137 H205 V125 A10,10 0 0 1 215,115 Z" fill="#1C544F"/>
  <text x="260" y="129" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">starting</text>
  <text x="260" y="153" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">OnStart(ctx)</text>
  <text x="260" y="167" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">ctx has timeout</text>

  
  <line x1="320" y1="145" x2="360" y2="145" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="340" y="137" text-anchor="middle" fill="#16a34a" font-family="system-ui, sans-serif" font-size="9" font-weight="600">nil</text>

  
  <rect x="365" y="115" width="110" height="60" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M375,115 H465 A10,10 0 0 1 475,125 V137 H365 V125 A10,10 0 0 1 375,115 Z" fill="#1C544F"/>
  <text x="420" y="129" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">running</text>
  <text x="420" y="153" text-anchor="middle" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="10" font-weight="600">accepting traffic</text>
  <text x="420" y="167" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">business as usual</text>

  
  <line x1="480" y1="145" x2="520" y2="145" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="500" y="137" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="9" font-weight="600">SIGTERM</text>

  
  <rect x="525" y="115" width="110" height="60" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M535,115 H625 A10,10 0 0 1 635,125 V137 H525 V125 A10,10 0 0 1 535,115 Z" fill="#1C544F"/>
  <text x="580" y="129" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">stopping</text>
  <text x="580" y="153" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="10">OnStop(ctx)</text>
  <text x="580" y="167" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">reverse order</text>

  
  <rect x="660" y="115" width="55" height="60" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="687" y="150" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">stopped</text>

  
  <path d="M580,175 V200 H645 V150 H658" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>
  <text x="612" y="218" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="9" font-weight="600">OnStop returns</text>

  
  <path d="M260,175 V265 H687 V177" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow-fail)"/>
  <text x="473" y="257" text-anchor="middle" fill="#b91c1c" font-family="system-ui, sans-serif" font-size="9" font-weight="600">OnStart returned error: unwind and exit 1</text>

  
  <text x="380" y="298" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">OnStart runs before the server accepts traffic. OnStop runs during graceful shutdown; errors are logged, not fatal.</text>
  <text x="380" y="316" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">For the multi-component ordering, see the lifecycle sequence in the reference.</text>
</svg>
