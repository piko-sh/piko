  <text x="397" y="245" text-anchor="middle" fill="#1C544F" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Sign up</text>

  
  <rect x="30" y="280" width="440" height="14" rx="3" fill="#2B333B" stroke="#485461" stroke-width="1"/>
  <text x="40" y="291" fill="#92A1AF" font-family="monospace" font-size="9">go build -&gt; ./app (single binary, ready to deploy)</text>
