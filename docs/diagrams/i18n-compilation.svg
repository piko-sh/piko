<svg viewBox="0 0 760 510" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="i18n-title i18n-desc">
  <title id="i18n-title">i18n at runtime: build-time emit, request-time fluent lookup</title>
  <desc id="i18n-desc">At build time, JSON sources (global i18n directory plus per-page i18n blocks) are flattened, parsed once into template ASTs, and serialised to a FlatBuffer Store for zero-copy loading. At request time, r.T(key) returns a fluent Translation builder that takes typed variables (StringVar, IntVar, MoneyVar, DateTimeVar) and a Count for CLDR plural selection, then renders to a string in the active locale.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <text x="30" y="28" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">BUILD TIME</text>
  <line x1="120" y1="24" x2="730" y2="24" stroke="#475569" stroke-width="0.6" stroke-dasharray="2,3"/>

  
  <rect x="25" y="40" width="240" height="115" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M35,40 H255 A10,10 0 0 1 265,50 V64 H25 V50 A10,10 0 0 1 35,40 Z" fill="#1C544F"/>
  <circle cx="41" cy="52" r="4" fill="#ff5f57"/>
  <circle cx="55" cy="52" r="4" fill="#febc2e"/>
  <circle cx="69" cy="52" r="4" fill="#28c840"/>
  <text x="155" y="57" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="11">locales/en.json</text>

  <text x="38" y="83" fill="#C9F5F2" font-family="monospace" font-size="10">{</text>
  <text x="50" y="97" fill="#A7F0E9" font-family="monospace" font-size="10">"nav": {</text>
  <text x="62" y="111" fill="#C9F5F2" font-family="monospace" font-size="10">"home": </text>
  <text x="120" y="111" fill="#FFEE9C" font-family="monospace" font-size="10">"Home"</text>
  <text x="50" y="125" fill="#A7F0E9" font-family="monospace" font-size="10">},</text>
  <text x="50" y="139" fill="#C9F5F2" font-family="monospace" font-size="10">"items": </text>
  <text x="116" y="139" fill="#FFEE9C" font-family="monospace" font-size="10">"one|${count} items"</text>
  <text x="38" y="153" fill="#C9F5F2" font-family="monospace" font-size="10">}</text>

  
  <rect x="25" y="170" width="240" height="105" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M35,170 H255 A10,10 0 0 1 265,180 V194 H25 V180 A10,10 0 0 1 35,170 Z" fill="#1C544F"/>
  <text x="155" y="187" text-anchor="middle" fill="#C9F5F2" font-family="monospace" font-size="11">pages/about.pk &lt;i18n&gt;</text>

  <text x="38" y="213" fill="#6BD5CC" font-family="monospace" font-size="10" font-weight="600">&lt;i18n lang="json"&gt;</text>
  <text x="38" y="227" fill="#A7F0E9" font-family="monospace" font-size="10">"en": {</text>
  <text x="50" y="241" fill="#C9F5F2" font-family="monospace" font-size="10">"hello": </text>
  <text x="116" y="241" fill="#FFEE9C" font-family="monospace" font-size="10">"Hello, ${name}!"</text>
  <text x="38" y="255" fill="#A7F0E9" font-family="monospace" font-size="10">}</text>
  <text x="38" y="269" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">page-scoped, JSON only</text>

  
  <line x1="270" y1="100" x2="345" y2="140" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="270" y1="220" x2="345" y2="190" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="307" y="158" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="9" font-weight="600">cmd/generator</text>
  <text x="307" y="172" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">flatten + parse</text>

  
  <rect x="350" y="80" width="380" height="170" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.5"/>
  <path d="M360,80 H720 A10,10 0 0 1 730,90 V104 H350 V90 A10,10 0 0 1 360,80 Z" fill="#364049"/>
  <text x="540" y="96" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="11" font-weight="600">dist/i18n.bin (FlatBuffer Store)</text>

  <text x="365" y="125" fill="#A7F0E9" font-family="monospace" font-size="10">en  →  nav.home    "Home"</text>
  <text x="365" y="143" fill="#A7F0E9" font-family="monospace" font-size="10">en  →  items       parts: ["one", "|", ${count}, " items"]</text>
  <text x="365" y="161" fill="#A7F0E9" font-family="monospace" font-size="10">en  →  hello       parts: ["Hello, ", ${name}, "!"]</text>

  <text x="365" y="190" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">flat keys (dot-paths)</text>
  <text x="365" y="206" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">per-locale entries</text>
  <text x="365" y="222" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">${expr} and @-links pre-parsed into template ASTs</text>
  <text x="365" y="238" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">zero-copy on load</text>

  
  <text x="30" y="305" fill="#475569" font-family="system-ui, sans-serif" font-size="11" font-weight="600">REQUEST TIME</text>
  <line x1="135" y1="301" x2="730" y2="301" stroke="#475569" stroke-width="0.6" stroke-dasharray="2,3"/>

  
  <path d="M540,250 V322" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <text x="555" y="285" fill="#0F766E" font-family="system-ui, sans-serif" font-size="9" font-weight="600">load once at boot</text>

  
  <rect x="25" y="325" width="320" height="92" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M35,325 H335 A10,10 0 0 1 345,335 V347 H25 V335 A10,10 0 0 1 35,325 Z" fill="#1C544F"/>
  <text x="185" y="340" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="11" font-weight="600">in a template or Render()</text>

  <text x="38" y="365" fill="#C9F5F2" font-family="monospace" font-size="10">r.T(</text>
  <text x="62" y="365" fill="#FFEE9C" font-family="monospace" font-size="10">"hello"</text>
  <text x="100" y="365" fill="#C9F5F2" font-family="monospace" font-size="10">).</text>
  <text x="38" y="383" fill="#A7F0E9" font-family="monospace" font-size="10">  StringVar(</text>
  <text x="105" y="383" fill="#FFEE9C" font-family="monospace" font-size="10">"name"</text>
  <text x="135" y="383" fill="#C9F5F2" font-family="monospace" font-size="10">, user.Name).</text>
  <text x="38" y="401" fill="#A7F0E9" font-family="monospace" font-size="10">  Count(</text>
  <text x="80" y="401" fill="#FFEE9C" font-family="monospace" font-size="10">5</text>
  <text x="86" y="401" fill="#C9F5F2" font-family="monospace" font-size="10">).</text>
  <text x="100" y="401" fill="#A7F0E9" font-family="monospace" font-size="10">String()</text>

  
  <line x1="350" y1="371" x2="395" y2="371" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <rect x="400" y="325" width="330" height="92" rx="10" fill="#1C544F"/>
  <text x="565" y="342" text-anchor="middle" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Translation builder</text>

  <text x="412" y="363" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">1. resolve key in fallback chain</text>
  <text x="412" y="378" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">en-GB → en → defaultLocale → fallback → key</text>
  <text x="412" y="395" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">2. select plural form by CLDR rules</text>
  <text x="412" y="410" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">zero/one/two/few/many/other per locale</text>

  
  <rect x="25" y="437" width="705" height="60" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="40" y="457" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">3. render with locale-aware formatting</text>
  <text x="40" y="475" fill="#A7F0E9" font-family="monospace" font-size="10">→ "Hello, Alice!"</text>
  <text x="40" y="491" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">MoneyVar / DateTimeVar / FloatVar pick decimal separators, currency symbols, date patterns from r.Locale()</text>
</svg>
