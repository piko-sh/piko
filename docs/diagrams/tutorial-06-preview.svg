<svg viewBox="0 0 500 320" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="t06-title t06-desc">
  <title id="t06-title">Tutorial 6 preview: a working pikotest suite for the task manager</title>
  <desc id="t06-desc">A terminal window showing go test output. A component test renders the task-list and asserts on the output. An action test exercises the Create path. A snapshot test captures the empty state. All three tests pass with green checkmarks and a final PASS line reports coverage.</desc>
  <defs/>

  <text x="250" y="18" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">WHAT YOU WILL BUILD</text>

  
  <rect x="30" y="35" width="440" height="230" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.5"/>
  <path d="M40,35 H460 A10,10 0 0 1 470,45 V65 H30 V45 A10,10 0 0 1 40,35 Z" fill="#364049"/>
  <circle cx="46" cy="49" r="4" fill="#ff5f57"/>
  <circle cx="60" cy="49" r="4" fill="#febc2e"/>
  <circle cx="74" cy="49" r="4" fill="#28c840"/>
  <text x="250" y="54" text-anchor="middle" fill="#92A1AF" font-family="monospace" font-size="10">tasks-app &#183; zsh</text>

  
  <text x="45" y="90" fill="#6BD5CC" font-family="monospace" font-size="11">$</text>
  <text x="60" y="90" fill="#C9F5F2" font-family="monospace" font-size="11">go test ./dist/...</text>

  
  <text x="45" y="115" fill="#28c840" font-family="monospace" font-size="11">PASS</text>
  <text x="85" y="115" fill="#C9F5F2" font-family="monospace" font-size="11">TestTaskList_RendersItems</text>
  <text x="455" y="115" text-anchor="end" fill="#92A1AF" font-family="monospace" font-size="10">0.03s</text>

  
  <text x="45" y="138" fill="#28c840" font-family="monospace" font-size="11">PASS</text>
  <text x="85" y="138" fill="#C9F5F2" font-family="monospace" font-size="11">TestCreateAction_Validates</text>
  <text x="455" y="138" text-anchor="end" fill="#92A1AF" font-family="monospace" font-size="10">0.01s</text>

  
  <text x="45" y="161" fill="#28c840" font-family="monospace" font-size="11">PASS</text>
  <text x="85" y="161" fill="#C9F5F2" font-family="monospace" font-size="11">TestTaskList_EmptyState_Snapshot</text>
  <text x="455" y="161" text-anchor="end" fill="#92A1AF" font-family="monospace" font-size="10">0.02s</text>

  
  <line x1="45" y1="178" x2="455" y2="178" stroke="#485461" stroke-width="1" stroke-dasharray="2,3"/>

  
  <text x="45" y="198" fill="#FFEE9C" font-family="monospace" font-size="11">ok</text>
  <text x="70" y="198" fill="#C9F5F2" font-family="monospace" font-size="11">tasks-app/dist/pages/pages_tasks</text>
  <text x="455" y="198" text-anchor="end" fill="#92A1AF" font-family="monospace" font-size="10">0.06s</text>

  <text x="45" y="218" fill="#FFEE9C" font-family="monospace" font-size="11">ok</text>
  <text x="70" y="218" fill="#C9F5F2" font-family="monospace" font-size="11">tasks-app/dist/actions/actions_tasks</text>
  <text x="455" y="218" text-anchor="end" fill="#92A1AF" font-family="monospace" font-size="10">0.02s</text>

  
  <rect x="45" y="230" width="100" height="22" rx="5" fill="#1C544F" stroke="#28c840" stroke-width="1.3"/>
  <text x="95" y="246" text-anchor="middle" fill="#28c840" font-family="monospace" font-size="11" font-weight="600">PASS &#183; 3/3</text>
  <text x="160" y="246" fill="#92A1AF" font-family="monospace" font-size="10">no browser, no database, seconds to run</text>

  <text x="250" y="290" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">pikotest renders PK files directly, asserts on output,</text>
  <text x="250" y="306" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">and captures snapshots without a running server.</text>
</svg>
