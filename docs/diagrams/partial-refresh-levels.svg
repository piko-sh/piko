<svg viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="prl-title prl-desc">
  <title id="prl-title">The four partial-refresh levels and what survives a reload</title>
  <desc id="prl-desc">Four columns, one per refresh level, show the trigger attribute and what is preserved or refreshed when piko.partial.reload runs. Level zero is the default and refreshes only children, leaving every root attribute and parent CSS scope intact. Level one adds pk-refresh-root and refreshes the root attributes while preserving the parent scope chain. Level two adds pk-own-attrs and only refreshes the attributes the partial template owns. Level three adds pk-no-refresh-attrs and refreshes everything except the listed attributes.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0F766E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  
  <rect x="20" y="14" width="600" height="34" rx="8" fill="#1C544F"/>
  <text x="320" y="30" text-anchor="middle" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="11" font-weight="600">piko.partial(name).reload()</text>
  <text x="320" y="44" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="10">DOM morph, not replace</text>

  <line x1="320" y1="50" x2="320" y2="68" stroke="#0F766E" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#arrow)"/>

  
  <rect x="20" y="74" width="146" height="200" rx="10" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <path d="M30,74 H156 A10,10 0 0 1 166,84 V96 H20 V84 A10,10 0 0 1 30,74 Z" fill="#364049"/>
  <text x="93" y="89" text-anchor="middle" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="10" font-weight="600">level 0 (default)</text>
  <text x="93" y="113" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="9">no attribute</text>

  <text x="32" y="138" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ children update</text>
  <text x="32" y="156" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ root attrs survive</text>
  <text x="32" y="174" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ JS attrs survive</text>
  <text x="32" y="192" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ scope chain kept</text>
  <text x="32" y="222" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">use when the</text>
  <text x="32" y="234" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">container is stable</text>
  <text x="32" y="246" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">across renders</text>

  
  <rect x="174" y="74" width="146" height="200" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M184,74 H310 A10,10 0 0 1 320,84 V96 H174 V84 A10,10 0 0 1 184,74 Z" fill="#1C544F"/>
  <text x="247" y="89" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">level 1</text>
  <text x="247" y="113" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="9">pk-refresh-root</text>

  <text x="186" y="138" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ root attrs refresh</text>
  <text x="186" y="156" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ children update</text>
  <text x="186" y="174" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ scope chain kept</text>
  <text x="186" y="192" fill="#ff5f57" font-family="system-ui, sans-serif" font-size="10">- JS attrs replaced</text>
  <text x="186" y="222" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">use when root</text>
  <text x="186" y="234" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">attrs change but</text>
  <text x="186" y="246" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">parent scopes stay</text>

  
  <rect x="328" y="74" width="146" height="200" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M338,74 H464 A10,10 0 0 1 474,84 V96 H328 V84 A10,10 0 0 1 338,74 Z" fill="#1C544F"/>
  <text x="401" y="89" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">level 2</text>
  <text x="401" y="113" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="9">pk-own-attrs="..."</text>

  <text x="340" y="138" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ listed attrs refresh</text>
  <text x="340" y="156" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ children update</text>
  <text x="340" y="174" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ JS attrs survive</text>
  <text x="340" y="192" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ scope chain kept</text>
  <text x="340" y="222" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">use when template</text>
  <text x="340" y="234" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">owns some attrs and</text>
  <text x="340" y="246" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">JS owns others</text>

  
  <rect x="482" y="74" width="138" height="200" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M492,74 H610 A10,10 0 0 1 620,84 V96 H482 V84 A10,10 0 0 1 492,74 Z" fill="#1C544F"/>
  <text x="551" y="89" text-anchor="middle" fill="#6BD5CC" font-family="system-ui, sans-serif" font-size="10" font-weight="600">level 3</text>
  <text x="551" y="113" text-anchor="middle" fill="#A7F0E9" font-family="monospace" font-size="9">pk-no-refresh-attrs</text>

  <text x="494" y="138" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ all attrs refresh</text>
  <text x="494" y="156" fill="#ff5f57" font-family="system-ui, sans-serif" font-size="10">- except listed ones</text>
  <text x="494" y="174" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ children update</text>
  <text x="494" y="192" fill="#28c840" font-family="system-ui, sans-serif" font-size="10">+ scope chain kept</text>
  <text x="494" y="222" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">use to preserve</text>
  <text x="494" y="234" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">specific init or</text>
  <text x="494" y="246" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">runtime flags</text>

  
  <rect x="20" y="288" width="600" height="58" rx="8" fill="#2B333B" stroke="#485461" stroke-width="1.2"/>
  <text x="32" y="306" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="10" font-weight="600">scope chain rule (every level)</text>
  <text x="32" y="324" fill="#C9F5F2" font-family="monospace" font-size="10">before: partial="child_xyz parent_abc"  →  server: "child_new"</text>
  <text x="32" y="338" fill="#C9F5F2" font-family="monospace" font-size="10">after:  partial="child_new parent_abc"   (parent scope preserved)</text>
</svg>
