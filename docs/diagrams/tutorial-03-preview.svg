<svg viewBox="0 0 500 300" fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="t03-title t03-desc">
  <title id="t03-title">Tutorial 3 preview: validated contact form with streaming progress</title>
  <desc id="t03-desc">A browser window showing the finished contact form built in tutorial 3. Three form fields (name, email, message), a submit button, and a validation error message displayed inline beside the email field. Below the form, a progress bar fills as a streaming action reports progress.</desc>
  <defs/>

  <text x="250" y="18" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="1">WHAT YOU WILL BUILD</text>

  
  <rect x="30" y="35" width="440" height="230" rx="10" fill="#236962" stroke="#6BD5CC" stroke-width="1.5"/>
  <path d="M40,35 H460 A10,10 0 0 1 470,45 V65 H30 V45 A10,10 0 0 1 40,35 Z" fill="#1C544F"/>
  <circle cx="46" cy="49" r="4" fill="#ff5f57"/>
  <circle cx="60" cy="49" r="4" fill="#febc2e"/>
  <circle cx="74" cy="49" r="4" fill="#28c840"/>

  <rect x="100" y="42" width="340" height="14" rx="4" fill="#364049"/>
  <text x="115" y="53" fill="#C9F5F2" font-family="monospace" font-size="9">http://localhost:8080/contact</text>

  
  <text x="60" y="95" fill="#FFEE9C" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Contact us</text>

  
  <text x="60" y="115" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="10">Name</text>
  <rect x="60" y="120" width="380" height="22" rx="4" fill="#1C544F" stroke="#485461" stroke-width="1"/>
  <text x="70" y="135" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">Alice</text>

  
  <text x="60" y="157" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="10">Email</text>
  <rect x="60" y="162" width="380" height="22" rx="4" fill="#1C544F" stroke="#ff5f57" stroke-width="1.3"/>
  <text x="70" y="177" fill="#C9F5F2" font-family="system-ui, sans-serif" font-size="10">not-an-email</text>
  <text x="60" y="195" fill="#ff5f57" font-family="system-ui, sans-serif" font-size="9" font-weight="600">not a valid email address</text>

  
  <text x="60" y="210" fill="#A7F0E9" font-family="system-ui, sans-serif" font-size="10">Message</text>

  
  <rect x="60" y="220" width="100" height="28" rx="6" fill="#6BD5CC"/>
  <text x="110" y="238" text-anchor="middle" fill="#1C544F" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Send</text>

  
  <text x="180" y="230" fill="#92A1AF" font-family="system-ui, sans-serif" font-size="9">sending...</text>
  <rect x="180" y="234" width="240" height="8" rx="4" fill="#364049"/>
  <rect x="180" y="234" width="150" height="8" rx="4" fill="#6BD5CC"/>
  <text x="430" y="241" text-anchor="end" fill="#C9F5F2" font-family="monospace" font-size="9">62%</text>

  <text x="250" y="288" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Typed server action validates input and streams progress over SSE</text>
</svg>
