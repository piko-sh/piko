# .air.toml
# Config file for Air live browser reloading
# See https://github.com/cosmtrek/air for more details

root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -tags safe -gcflags \"all=-N -l\" -o ./bin/main ./cmd/main/main.go"
bin = "./bin/main"
full_bin = "./bin/main dev-i"
# full_bin = "dlv --continue --accept-multiclient --listen=:2345 --headless=true --api-version=2 exec ./bin/main dev-i --"
delay = 500 # ms
exclude_file = ["config.json"]
include_ext = ["go", "json"]
exclude_dir = ["tmp", "dist", "pkc", "bin", ".piko", ".out"]
log = "air.log"
stop_on_error = true
follow_symlink = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false