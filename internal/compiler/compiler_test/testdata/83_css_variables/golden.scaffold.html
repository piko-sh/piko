<template shadowrootmode="open"><style>
    :host {
        --bg-color: #ffffff;
        --text-color: #000000;
    }

    :host(.dark) {
        --bg-color: #1a1a1a;
        --text-color: #ffffff;
    }

    .themed-box {
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 20px;
        border: 1px solid currentColor;
    }
</style><div><button id="toggle">Toggle Theme</button><div class="themed-box" id="box">Themed Box</div><p id="status"></p></div></template>
