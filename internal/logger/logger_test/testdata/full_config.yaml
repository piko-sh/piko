# A comprehensive configuration for integration testing.
addSource: true

outputs:
  - name: "console"
    type: "stdout"
    level: "debug"
    format: "pretty"
    noColor: true # Important for testing

  - name: "file-json"
    type: "file"
    level: "info"
    format: "json"
    file:
      path: "/tmp/test-app.log" # The test should ensure this file is created/written to in a temp dir
      maxSize: 1
      maxBackups: 1
      compress: false

integrations:
  - name: "sentry-test"
    type: "sentry"
    enabled: true
    sentry:
      dsn: "https://examplePublicKey@o0.ingest.sentry.io/0" # Dummy DSN for testing
      enableTracing: true
      tracesSampleRate: 1.0
      environment: "test"
      release: "v1.0.0-test"
      eventLevel: "warn"