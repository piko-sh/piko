<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Created with a Fictional Vector Editor -->
<svg
        width="200"
        height="100"
        viewBox="0 0 200 100"
        version="1.1"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:piko="http://piko.sh/ns">

    <piko:metadata>
        <piko:author>Piko Test Suite</piko:author>
        <piko:description>A simple SVG with elements to be minified.</piko:description>
    </piko:metadata>

    <title>Minification Test SVG</title>

    <!-- This is a group that adds no value and can be removed -->
    <g id="useless-group">
        <rect
                id="background-rect"
                style="fill:#f0f0f0; stroke:none;"
                width="200.0"
                height="100.0"
                x="0"
                y="0" />
    </g>

    <!-- The main shapes of the icon -->
    <g id="main-shapes" transform="translate(10, 10)">

        <circle
                id="red-circle"
                style="fill:#ff0000; stroke:#000000; stroke-width:2px;"
                cx="40"
                cy="40"
                r="30" />

        <path
                id="blue-swoosh"
                fill="#0000ff"
                d="M 100,20 C 120,20 120,60 140,60 S 160,20 180,20"
                stroke="black"
                stroke-width="2.5" />
    </g>

</svg>