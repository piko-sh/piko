<html>
<head>
    <style>
        .primary {
            color: var(--colour-primary);
            background: var(--bg-color, #FFF);
        }
        .nested {
            border-color: var(--border-color);
        }
        .complex {
            border: var(--border-width) solid var(--border-color);
            padding: var(--spacing);
        }
        .fallback {
            color: var(--undefined, blue);
        }
    </style>
</head>
<body>
    <div class="primary">Primary color</div>
    <div class="nested">Nested variable</div>
    <div class="complex">Complex with multiple vars</div>
    <div class="fallback">Fallback value</div>
</body>
</html>
