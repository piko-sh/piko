<html>
<head>
    <style>
        #section-one {
            background-color: #e3f2fd;
            padding: 20px;
            margin-bottom: 10px;
        }
        #section-two {
            background-color: #fff3e0;
            padding: 20px;
            margin-bottom: 10px;
        }
        #unreferenced {
            background-color: #f3e5f5;
            padding: 20px;
            margin-bottom: 10px;
        }
        .nav-link {
            color: #1976d2;
            text-decoration: underline;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#section-one" class="nav-link">Go to Section One</a>
        <a href="#section-two" class="nav-link">Go to Section Two</a>
    </nav>

    <div id="section-one">
        <h2>Section One</h2>
        <p>This section is referenced by an anchor link.</p>
    </div>

    <div id="section-two">
        <h2>Section Two</h2>
        <p>This section is also referenced by an anchor link.</p>
    </div>

    <div id="unreferenced">
        <h2>Unreferenced Section</h2>
        <p>This section has an ID but no anchor link references it, so the ID should be removed.</p>
    </div>
</body>
</html>
