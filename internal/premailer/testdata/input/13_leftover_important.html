<html>
<head>
    <style>
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            color: #ff0000;
            text-decoration: underline;
        }
        a:visited {
            color: #800080;
        }
        @media only screen and (max-width: 600px) {
            .container {
                width: 100%;
            }
            .mobile-hide {
                display: none;
            }
        }
        .container {
            width: 600px;
        }
        .mobile-hide {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="#">Normal Link</a>
        <p class="mobile-hide">This will be hidden on mobile</p>
    </div>
</body>
</html>
