<html>
<head>
    <style>
        .hex-color {
            color: #FF0000;
            background-color: #00ff00;
        }
        .rgb-color {
            color: rgb(255, 0, 0);
            background-color: rgb(0, 255, 0);
        }
        .rgba-color {
            color: rgba(255, 0, 0, 0.5);
        }
        .named-color {
            color: red;
            background-color: blue;
        }
        .bg-shorthand {
            background: #cccccc url(image.png) no-repeat center;
        }
        table {
            background-color: #f5f5f5;
        }
        td.colored {
            background: rgb(200, 200, 255);
        }
    </style>
</head>
<body>
    <p class="hex-color">Hex colors</p>
    <p class="rgb-color">RGB colors</p>
    <p class="rgba-color">RGBA colors</p>
    <p class="named-color">Named colors</p>
    <div class="bg-shorthand">Background shorthand</div>
    <table>
        <tr>
            <td class="colored">Colored table cell</td>
        </tr>
    </table>
</body>
</html>
