<html>
<head>
    <style>
        .container {
            width: 600px;
            margin: 0 auto;
        }
        .header {
            background-color: #0066cc;
            color: #ffffff;
            padding: 20px;
        }
        .content {
            padding: 15px;
            font-size: 14px;
        }
        .button {
            background-color: #ff6600;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #666666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Newsletter Header</h1>
        </div>
        <div class="content">
            <p>This is the main content area.</p>
            <a href="#" class="button">Click Me</a>
        </div>
        <div class="footer">
            <p>&copy; 2025 Company Name</p>
        </div>
    </div>
</body>
</html>
