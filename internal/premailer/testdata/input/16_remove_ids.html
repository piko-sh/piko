<html>
<head>
    <style>
        #header {
            background-color: #0066cc;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        #main-content {
            width: 600px;
            margin: 0 auto;
            padding: 15px;
        }
        #highlight {
            color: #ff6600;
            font-weight: bold;
            font-size: 18px;
        }
        #footer {
            text-align: center;
            font-size: 12px;
            color: #666666;
            padding: 10px;
        }
        .button {
            background-color: #28a745;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
        }
        #special-box.container {
            border: 2px solid #333333;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Newsletter Header</h1>
    </div>
    <div id="main-content">
        <p id="highlight">This is an important announcement!</p>
        <p>Regular paragraph without ID.</p>
        <a href="#" class="button">Click Here</a>
    </div>
    <div id="special-box" class="container">
        <span>Content in special box</span>
    </div>
    <div id="footer">
        <p>&copy; 2025 Company Name</p>
    </div>
</body>
</html>
