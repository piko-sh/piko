<html>
<head>
    <style>
        p {
            color: blue;
            font-size: 14px;
        }
        .override {
            color: red !important;
            font-weight: bold;
        }
        .important-width {
            width: 100% !important;
            padding: 10px;
        }
        #special {
            background-color: yellow !important;
            border: 1px solid black !important;
        }
        .mixed {
            margin: 0;
            padding: 5px !important;
            text-align: center !important;
        }
    </style>
</head>
<body>
    <p>Normal paragraph (no important)</p>
    <p class="override">This has important color</p>
    <div class="important-width">Important width with normal padding</div>
    <div id="special">Multiple important properties</div>
    <div class="mixed">Mixed important and normal</div>
</body>
</html>
