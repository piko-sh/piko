<html>
<head>
    <style>
        p {
            color: blue;
            font-size: 12px;
        }
        .override {
            color: green !important;
        }
        #strongest {
            color: purple !important;
            font-size: 20px !important;
        }
        .mixed {
            background-color: yellow;
            padding: 10px !important;
        }
    </style>
</head>
<body>
    <p style="color: red;">This should be blue (no important rule)</p>
    <p class="override" style="color: red;">This should be green (!important wins over inline)</p>
    <p id="strongest" class="override" style="color: red; font-size: 10px;">This should be purple and 20px (ID !important wins)</p>
    <p class="mixed">Mixed important and normal</p>
</body>
</html>
