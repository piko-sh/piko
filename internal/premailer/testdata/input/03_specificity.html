<html>
<head>
    <style>
        p {
            color: blue;
            font-size: 12px;
        }
        .highlight {
            color: green;
            font-weight: bold;
        }
        #special {
            color: red;
        }
        .bold.large {
            font-size: 18px;
            font-weight: bold;
        }
        div p {
            margin: 10px;
        }
        div.container p {
            padding: 5px;
        }
    </style>
</head>
<body>
    <p>Default paragraph (blue, 12px)</p>
    <p class="highlight">Highlighted paragraph (green, bold, 12px)</p>
    <p id="special">Special paragraph (red, 12px)</p>
    <p class="highlight" id="special">Both class and ID (red wins, bold, 12px)</p>
    <div class="container">
        <p class="bold large">Bold and large (should have margin, padding, 18px, bold)</p>
    </div>
</body>
</html>
