<html>
<head>
    <style>
        p {
            color: blue;
            font-size: 14px;
        }
        .container {
            width: 600px;
        }
    </style>
    <style>
        p {
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .highlighted {
            background-color: yellow;
        }
    </style>
    <style data-premailer="ignore">
        .special {
            border: 5px dashed red;
        }
    </style>
</head>
<body>
    <div class="container" style="margin: 10px;">
        <p style="text-decoration: underline;">Paragraph with inline style</p>
        <p class="highlighted">Highlighted paragraph</p>
        <p class="special">Special paragraph (style should be ignored by premailer)</p>
    </div>
</body>
</html>
