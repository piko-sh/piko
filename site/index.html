<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="go-import" content="piko.sh/piko git https://github.com/piko-sh/piko">
    <meta name="go-source" content="piko.sh/piko https://github.com/piko-sh/piko https://github.com/piko-sh/piko/tree/master{/dir} https://github.com/piko-sh/piko/blob/master{/dir}/{file}#L{line}">
    <title>Piko</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        main { text-align: center; max-width: 480px; padding: 2rem; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 1.5rem; }
        a { color: #888; text-decoration: none; border-bottom: 1px solid #333; transition: color 0.2s; }
        a:hover { color: #e0e0e0; border-color: #e0e0e0; }
        code { background: #1a1a1a; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.95em; }
    </style>
</head>
<body>
    <main>
        <h1>Piko</h1>
        <p>Server-side rendering framework for Go.</p>
        <p><code>go get piko.sh/piko</code></p>
        <p><a href="https://github.com/piko-sh/piko">GitHub</a></p>
    </main>
</body>
</html>
